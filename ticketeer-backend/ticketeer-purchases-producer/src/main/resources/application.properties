spring.application.name=ticketeer-customer
server.port=8091

#RabbitMQ Configurations
spring.rabbitmq.host=@spring.rabbitmq.host@
spring.rabbitmq.port=@spring.rabbitmq.port@
spring.rabbitmq.username=@rabbitmq.username@
spring.rabbitmq.password=@rabbitmq.password@

rabbitmq.queue=@rabbitmq.queue@
rabbitmq.exchange=@rabbitmq.exchange@
rabbitmq.routing.key=@rabbitmq.routing.key@

spring.datasource.url=jdbc:postgresql://localhost:5432/ticketeer_main
spring.datasource.username=ticketeer_db
spring.datasource.password=ticketeer
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect